# docker-compose.yml
version: '3.8'

services:
  traffic-monitor:
    build: .
    container_name: traffic-monitor-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/New_York
    volumes:
      # Mount the data directory to persist the SQLite database
      # This ensures your data survives container restarts.
      - ./data:/app/data
    networks:
      - backend-net

networks:
  backend-net:
    external: true
